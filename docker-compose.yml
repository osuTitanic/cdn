services:
  s3-cdn:
    build: .
    container_name: s3-cdn
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://s3.eu-central-1.wasabisys.com}
      - S3_REGION=${S3_REGION:-eu-central-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - ALLOWED_PREFIX=${ALLOWED_PREFIX:-}
      - LISTEN_ADDR=:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s